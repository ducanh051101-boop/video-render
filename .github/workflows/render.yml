name: Render Video

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'Mã video (vd VID-20260504-1234)'
        required: true
        type: string
      scenes:
        description: 'JSON array các scene URL'
        required: true
        type: string
      callback_url:
        description: 'n8n resume webhook URL'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup ffmpeg (static binary)
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: '7.1'

      - name: Run render
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VIDEO_ID: ${{ inputs.video_id }}
          SCENES_JSON: ${{ inputs.scenes }}
          CALLBACK_URL: ${{ inputs.callback_url }}
        run: node render.js

      - name: Notify n8n on cancel/failure
        if: cancelled() || failure()
        run: |
          curl -sS -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"video_id\":\"${{ inputs.video_id }}\",\"status\":\"error\",\"error\":\"GitHub Actions job ${{ job.status }} (timeout/cancel/fail)\"}"
